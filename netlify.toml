[build]
  command = "npm run build"
  publish = "dist"

# Single-page app fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cross-origin isolation → SharedArrayBuffer → multi-threaded onnxruntime WASM,
# which keeps Kokoro synthesis fast on the CPU (2–4× vs single-thread) while
# leaving the GPU entirely to WebLLM (running Kokoro on WebGPU exhausts VRAM and
# crashes the LLM). COEP "credentialless" keeps WebLLM's cross-origin model
# downloads from the Hugging Face CDN working (unlike "require-corp").
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
