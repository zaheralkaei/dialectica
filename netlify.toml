[build]
  command = "npm run build"
  publish = "dist"

# Single-page app fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# NOTE: intentionally no cross-origin isolation (COOP/COEP) headers. Enabling
# them turns on onnxruntime's multi-threaded WASM, whose nested pthread-worker
# path breaks in the production bundle and makes every Kokoro synth hang (30s
# timeout) — the debate runs but stays silent. Single-threaded Kokoro is a bit
# slower but actually produces audio when deployed. WebLLM uses WebGPU and does
# not need isolation.
